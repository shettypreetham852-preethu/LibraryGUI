<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library System - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: var(--bg-primary);
    }
    .login-container {
      background: var(--bg-card);
      padding: 2.5rem;
      border-radius: 1.5rem;
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid rgba(255,255,255,.08);
    }
    .login-header h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    .login-header p {
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .login-form .field {
      text-align: left;
    }
    .error-msg {
      color: #ef4444;
      font-size: 0.9rem;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <div class="logo-icon" style="margin: 0 auto 1rem auto; width: 48px; height: 48px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <line x1="8" y1="7" x2="16" y2="7"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </div>
      <h1>Librarian Login</h1>
      <p>Enter your credentials to manage the library</p>
    </div>

    <form class="login-form modal-form visible" id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. admin" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-glow full" style="margin-top: 1rem;">Sign In</button>
      <div class="error-msg" id="errorMsg">Invalid credentials. Default: admin / password</div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          localStorage.setItem('librarianToken', 'authenticated');
          window.location.href = '/index.html';
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Connection error.';
      }
    });
  </script>
</body>
</html>
